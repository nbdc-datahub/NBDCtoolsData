name: Relay NBDC Release to ReproSchema

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  relay:
    # Allow nbdc-datahub or yibeichan fork to run
    if: |
      github.repository == 'nbdc-datahub/NBDCtoolsData' ||
      github.repository == 'yibeichan/NBDCtoolsData'
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from DESCRIPTION
        id: version
        shell: bash
        run: |
          if [ ! -f DESCRIPTION ]; then
            echo "Error: DESCRIPTION file not found"
            exit 1
          fi
          VERSION=$(grep '^Version:' DESCRIPTION | head -1 | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from DESCRIPTION"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NBDC_CHECK_APP_ID }}
          private-key: ${{ secrets.NBDC_CHECK_APP_PRIVATE_KEY }}
          owner: ReproNim
          repositories: |
            ABCD-ReproSchema
            HBCD-ReproSchema

      - name: Trigger ABCD-ReproSchema workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app_token.outputs.token }}
          repository: ReproNim/ABCD-ReproSchema
          event-type: nbdc-release
          client-payload: |
            {
              "release": "${{ steps.version.outputs.version }}",
              "create_tag": true,
              "source_repo": "${{ github.repository }}",
              "release_url": "${{ github.event.release.html_url || '' }}",
              "triggered_by": "${{ github.actor }}"
            }

      - name: Trigger HBCD-ReproSchema workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app_token.outputs.token }}
          repository: ReproNim/HBCD-ReproSchema
          event-type: nbdc-release
          client-payload: |
            {
              "release": "${{ steps.version.outputs.version }}",
              "create_tag": true,
              "source_repo": "${{ github.repository }}",
              "release_url": "${{ github.event.release.html_url || '' }}",
              "triggered_by": "${{ github.actor }}"
            }
